version: '3.8'

# VULNOT Phase 5 - Complete OT Security Training Platform
# 8 Scenarios: Water, Power, Factory, Reactor, Building, Packaging, IIoT, CNC
# Plus: Historian, IDS, Forensics, Red/Blue Team

services:
  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================
  
  redis:
    image: redis:7-alpine
    container_name: vulnot-redis
    ports:
      - "6379:6379"
    networks:
      - vulnot-backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: vulnot-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=vulnot
      - DOCKER_INFLUXDB_INIT_PASSWORD=vulnot123
      - DOCKER_INFLUXDB_INIT_ORG=mjolnir
      - DOCKER_INFLUXDB_INIT_BUCKET=ot_data
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - vulnot-backend

  # ============================================================================
  # SCENARIO 1: WATER TREATMENT (Modbus TCP)
  # ============================================================================
  
  water-process:
    build: ../../simulators/water-treatment
    container_name: vulnot-water-process
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - vulnot-backend
      - vulnot-ot-water

  plc-intake:
    build: ../../simulators/water-treatment
    container_name: vulnot-plc-intake
    environment:
      - REDIS_HOST=redis
      - MODBUS_PORT=502
      - PLC_ZONE=intake
    ports:
      - "10502:502"
    networks:
      vulnot-ot-water:
        ipv4_address: 10.0.1.10

  attacker-water:
    build: ../../attacker
    container_name: vulnot-attacker-water
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-water:
        ipv4_address: 10.0.1.100

  # ============================================================================
  # SCENARIO 2: POWER GRID (DNP3)
  # ============================================================================
  
  substation-1:
    build: ../../simulators/dnp3-power
    container_name: vulnot-substation-1
    environment:
      - REDIS_HOST=redis
      - DNP3_PORT=20000
    ports:
      - "20000:20000"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-power:
        ipv4_address: 10.0.2.10

  attacker-power:
    build: ../../attacker
    container_name: vulnot-attacker-power
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-power:
        ipv4_address: 10.0.2.100

  # ============================================================================
  # SCENARIO 3: MANUFACTURING (S7comm)
  # ============================================================================
  
  factory-line1:
    build: ../../simulators/s7-factory
    container_name: vulnot-factory-line1
    environment:
      - REDIS_HOST=redis
      - S7_PORT=102
    ports:
      - "10102:102"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-factory:
        ipv4_address: 10.0.3.10

  attacker-factory:
    build: ../../attacker
    container_name: vulnot-attacker-factory
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-factory:
        ipv4_address: 10.0.3.100

  # ============================================================================
  # SCENARIO 4: CHEMICAL REACTOR (OPC UA)
  # ============================================================================
  
  reactor-1:
    build: ../../simulators/opcua-industrial
    container_name: vulnot-reactor-1
    environment:
      - REDIS_HOST=redis
      - OPCUA_PORT=4840
    ports:
      - "4840:4840"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-reactor:
        ipv4_address: 10.0.4.10

  attacker-opcua:
    build: ../../attacker
    container_name: vulnot-attacker-opcua
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-reactor:
        ipv4_address: 10.0.4.100

  # ============================================================================
  # SCENARIO 5: BUILDING AUTOMATION (BACnet)
  # ============================================================================
  
  building-1:
    build: ../../simulators/bacnet-building
    container_name: vulnot-building-1
    environment:
      - REDIS_HOST=redis
      - BACNET_PORT=47808
    ports:
      - "47808:47808/udp"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-building:
        ipv4_address: 10.0.5.10

  attacker-bacnet:
    build: ../../attacker
    container_name: vulnot-attacker-bacnet
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-building:
        ipv4_address: 10.0.5.100

  # ============================================================================
  # SCENARIO 6: PACKAGING LINE (EtherNet/IP)
  # ============================================================================
  
  packaging-line1:
    build: ../../simulators/ethernet-ip
    container_name: vulnot-packaging-line1
    environment:
      - REDIS_HOST=redis
      - ENIP_PORT=44818
    ports:
      - "44818:44818"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-packaging:
        ipv4_address: 10.0.6.10

  attacker-enip:
    build: ../../attacker
    container_name: vulnot-attacker-enip
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-packaging:
        ipv4_address: 10.0.6.100

  # ============================================================================
  # SCENARIO 7: IIoT/MQTT SMART FACTORY
  # ============================================================================
  
  mqtt-broker:
    build: ../../simulators/mqtt-iiot
    container_name: vulnot-mqtt-broker
    environment:
      - REDIS_HOST=redis
      - MQTT_PORT=1883
    ports:
      - "1883:1883"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-iiot:
        ipv4_address: 10.0.7.5

  attacker-mqtt:
    build: ../../attacker
    container_name: vulnot-attacker-mqtt
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-iiot:
        ipv4_address: 10.0.7.100

  # ============================================================================
  # SCENARIO 8: CNC MOTION CONTROL (PROFINET) - NEW IN PHASE 5
  # ============================================================================
  
  cnc-machine:
    build: ../../simulators/profinet-motion
    container_name: vulnot-cnc-machine
    environment:
      - REDIS_HOST=redis
      - PROFINET_PORT=34964
    ports:
      - "34964:34964"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-motion:
        ipv4_address: 10.0.8.10

  attacker-profinet:
    build: ../../attacker
    container_name: vulnot-attacker-profinet
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-motion:
        ipv4_address: 10.0.8.100

  # ============================================================================
  # OT HISTORIAN - NEW IN PHASE 5
  # ============================================================================
  
  historian:
    build: ../../simulators/historian
    container_name: vulnot-historian
    environment:
      - REDIS_HOST=redis
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      vulnot-backend:
      vulnot-ot-historian:
        ipv4_address: 10.0.9.10

  attacker-historian:
    build: ../../attacker
    container_name: vulnot-attacker-historian
    stdin_open: true
    tty: true
    networks:
      vulnot-ot-historian:
        ipv4_address: 10.0.9.100

  # ============================================================================
  # DEFENSE SERVICES
  # ============================================================================
  
  ids:
    build:
      context: ../../defense/ids
      dockerfile: Dockerfile
    container_name: vulnot-ids
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - vulnot-backend
      - vulnot-ot-water
      - vulnot-ot-power
      - vulnot-ot-factory
      - vulnot-ot-reactor
      - vulnot-ot-building
      - vulnot-ot-packaging
      - vulnot-ot-iiot
      - vulnot-ot-motion
      - vulnot-ot-historian

  # ============================================================================
  # RED TEAM / FORENSICS WORKSTATION
  # ============================================================================
  
  redteam-workstation:
    build: ../../attacker
    container_name: vulnot-redteam
    stdin_open: true
    tty: true
    volumes:
      - ../../attacker/apt:/opt/apt
      - ../../defense/playbooks:/opt/playbooks:ro
      - forensics-evidence:/evidence
    environment:
      - ROLE=redteam
    networks:
      - vulnot-backend
      - vulnot-ot-water
      - vulnot-ot-power
      - vulnot-ot-factory
      - vulnot-ot-reactor
      - vulnot-ot-building
      - vulnot-ot-packaging
      - vulnot-ot-iiot
      - vulnot-ot-motion
      - vulnot-ot-historian

  # ============================================================================
  # APPLICATION SERVICES
  # ============================================================================
  
  api:
    build: ../../apps/api
    container_name: vulnot-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - INFLUXDB_URL=http://influxdb:8086
    depends_on:
      - redis
      - influxdb
    networks:
      - vulnot-backend

  dashboard:
    build: ../../apps/dashboard
    container_name: vulnot-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - vulnot-backend

  grafana:
    image: grafana/grafana:10.0.0
    container_name: vulnot-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=vulnot
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - vulnot-backend

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  vulnot-backend:
    driver: bridge
    
  vulnot-ot-water:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
          
  vulnot-ot-power:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
          
  vulnot-ot-factory:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.3.0/24
          
  vulnot-ot-reactor:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.4.0/24
          
  vulnot-ot-building:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.5.0/24
          
  vulnot-ot-packaging:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.6.0/24
          
  vulnot-ot-iiot:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.7.0/24
        
  vulnot-ot-motion:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.8.0/24
        
  vulnot-ot-historian:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.9.0/24

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  influxdb-data:
  grafana-data:
  forensics-evidence:
